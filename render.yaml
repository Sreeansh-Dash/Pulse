services:
  - type: web
    name: pulse-api
    plan: free
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.13

databases:
  - name: pulse-db
    plan: free
