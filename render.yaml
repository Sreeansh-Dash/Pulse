services:
  - type: web
    name: pulse-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false

  - type: worker
    name: pulse-worker
    runtime: python
    buildCommand: cd worker && pip install -r requirements.txt
    startCommand: set PYTHONPATH=../backend && cd worker && python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString
      - key: REDIS_URL
        sync: false

databases:
  - name: pulse-db
    plan: free
